<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Un pequeño mensaje ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#111827,#1f2937,#374151);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

/* Fondo de estrellas */

.estrellas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.estrella{
    position:absolute;
    color:white;
    animation:brillar 3s infinite ease-in-out;
    opacity:.3;
}

@keyframes brillar{
    0%{
        opacity:.2;
        transform:scale(.8);
    }
    50%{
        opacity:1;
        transform:scale(1.3);
    }
    100%{
        opacity:.2;
        transform:scale(.8);
    }
}

/* Caja principal */

.contenedor{
    position:relative;
    z-index:2;
    width:90%;
    max-width:700px;
    text-align:center;
    background:rgba(255,255,255,.08);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 30px rgba(0,0,0,.4);
    animation:aparecer 1.5s ease;
}

h1{
    font-size:42px;
    margin-bottom:25px;
}

p{
    font-size:22px;
    line-height:1.8;
    color:#ececec;
    margin-bottom:20px;
}

button{
    margin-top:30px;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    background:white;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="estrellas" id="estrellas"></div>

<div class="contenedor">

<h1>💌 Un pequeño mensaje...</h1>

<p>
Si estás leyendo esto, significa que llegaste hasta aquí...
 y eso ya me hace muy feliz. ❤️
</p>

<p>
Cada página fue hecha con mucho cariño,
pensando en cada detalle y en cada recuerdo.
</p>

<p>
Pero todavía queda algo más...
y creo que será mi parte favorita. ❤️
</p>

<a href="musica.html">
    <button>🎵 Quiero mostrarte algo especial...</button>
</a>

</div>

<script>

const estrellas = document.getElementById("estrellas");

for(let i=0;i<90;i++){

    const estrella = document.createElement("div");

    estrella.className="estrella";

    estrella.innerHTML="✦";

    estrella.style.left=Math.random()*100+"vw";
    estrella.style.top=Math.random()*100+"vh";

    estrella.style.fontSize=(8+Math.random()*12)+"px";

    estrella.style.animationDelay=Math.random()*3+"s";

    estrellas.appendChild(estrella);

}

</script>

</body>
</html>
