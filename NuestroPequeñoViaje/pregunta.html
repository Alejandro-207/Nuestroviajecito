<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Una pregunta para ti ❤️</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#020617,#4c1d95,#be185d);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

}



.contenedor{

position:relative;
z-index:2;
width:90%;
max-width:750px;
background:rgba(255,255,255,.1);
padding:50px;
border-radius:35px;
text-align:center;
backdrop-filter:blur(15px);
box-shadow:0 0 50px rgba(255,255,255,.25);
animation:entrada 2s ease;

}



h1{

font-size:50px;
margin-bottom:30px;

}



p{

font-size:23px;
line-height:1.8;
margin-bottom:25px;

}



.pregunta{

font-size:35px;
color:#ffd6ff;

}



button{

padding:18px 35px;
margin:10px;
border:none;
border-radius:40px;
font-size:20px;
cursor:pointer;
transition:.3s;

}


button:hover{

transform:scale(1.08);

}



.si{

background:#fb7185;
color:white;

}



.abrazo{

background:white;
color:#be185d;

}



.estrella{

position:absolute;
color:white;
animation:brillar 3s infinite ease-in-out;

}



.corazon{

position:absolute;
bottom:-30px;
font-size:28px;
animation:subir 7s linear infinite;

}



@keyframes brillar{

0%{
opacity:.2;
transform:scale(.8);
}

50%{
opacity:1;
transform:scale(1.3);
}

100%{
opacity:.2;
transform:scale(.8);
}

}



@keyframes subir{

from{

transform:translateY(0);
opacity:1;

}

to{

transform:translateY(-110vh);
opacity:0;

}

}



@keyframes entrada{

from{

opacity:0;
transform:translateY(50px);

}

to{

opacity:1;
transform:translateY(0);

}

}


</style>


</head>


<body>


<div class="contenedor">


<h1>
❤️ Alexa ❤️
</h1>


<p>
Después de este pequeño viaje,
de todos estos recuerdos y de todo lo que quería decirte...
</p>



<p class="pregunta">

Te quiero hacer una pregunta muy especial...

</p>



<p style="font-size:35px;">

¿Quieres ser mi novia? ❤️

</p>



<button class="si" onclick="location.href='final_si.html'">

Sí, quiero ❤️

</button>



<button class="abrazo" onclick="location.href='final_abrazo.html'">

Déjame darte un abrazo primero 🤍

</button>


</div>



<script>


for(let i=0;i<100;i++){

let estrella=document.createElement("div");

estrella.className="estrella";

estrella.innerHTML="✦";

estrella.style.left=Math.random()*100+"vw";

estrella.style.top=Math.random()*100+"vh";

estrella.style.fontSize=(8+Math.random()*15)+"px";


document.body.appendChild(estrella);

}




function crearCorazon(){

let corazon=document.createElement("div");

corazon.className="corazon";

corazon.innerHTML="❤️";

corazon.style.left=Math.random()*100+"vw";


document.body.appendChild(corazon);


setTimeout(()=>{

corazon.remove();

},7000);


}



setInterval(crearCorazon,800);



</script>


</body>

</html>
